{% extends "base.html" %}
{% block title %}Seller Login{% endblock %}

{% block content %}
<div class="container">
    <h2 style="text-align: center;color: goldenrod;padding-left: 24px;padding-right: 24px;font-size: 20px;">Seller Login</h2>
    <form method="POST" action="">
    {% csrf_token %}
    <label for="username">Email or Username</label>
    <input type="text" name="username" id="username" required>

    <label for="password">Password</label>
    <input type="password" name="password" id="password" required>

    <button type="submit" style="text-transform: uppercase;padding:12px ;border-radius: 8px;background:goldenrod;border: none;font-size: 18px;color: #fff;">Login</button>
   </form>

</div>
{% endblock %}
