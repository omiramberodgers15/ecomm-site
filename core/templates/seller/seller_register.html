{% extends "base.html" %}

{% block title %}Seller Registration{% endblock %}

{% block content %}
<h2 style="margin-bottom: 16px;padding-left: 16px;text-align: center;color:goldenrod;font-size: 20px;">Register as Seller</h2>

<form method="POST" id="register-form" action="" style="margin-bottom:8px;padding-left: 24px;padding-right: 24px;min-width: 48px;max-width: 100%;">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" style="padding: 12px ;border-radius: 12px;background: #febd69;border: none;font-size: 16px;text-transform: uppercase;">Register</button>
</form>


{% for message in messages %}
<p >{{ message }}</p>
{% endfor %}
{% endblock %}
