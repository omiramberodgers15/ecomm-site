{% extends "base.html" %}

{% block title %}Seller Registration{% endblock %}

{% block content %}
<h2>Register as Seller</h2>

<form method="POST" action="">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>


{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
{% endblock %}
